external_components:
  - source: github://slimcdk/esphome-custom-components
    components: [tmc2209_hub, tmc2209, stepper]

globals:
  - id: global_irun
    type: int
    restore_value: yes
    initial_value: '25'
  - id: global_speed
    type: int
    restore_value: yes
    initial_value: '1500'
  - id: global_acceleration
    type: int
    restore_value: yes
    initial_value: '1500'
  - id: global_tcoolthrs
    type: int
    restore_value: yes
    initial_value: '100'
  - id: global_sgthrs
    type: int
    restore_value: yes
    initial_value: '100'
  - id: global_distance_cm
    type: int
    restore_value: yes
    initial_value: '30'
  - id: global_distance_steps
    type: int
    restore_value: yes
    initial_value: '12732'
  - id: global_stepper_direction
    type: esphome::tmc2209::ShaftDirection
    restore_value: yes
    initial_value: 'esphome::tmc2209::ShaftDirection::CLOCKWISE'
  - id: global_distance_revolutions
    type: float
    restore_value: yes
    initial_value: '21.22'   

substitutions:
  gear_distance_cm: "3.7699" # Use for MK7 drive gear // The curtain will move 3.7699 cm per revolution
  steps_per_revolution: "1600"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

logger:

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

esphome:
  name: ropener-living-room
  friendly_name: "Ropener Living Room"
  on_boot:
    - tmc2209.configure:
        direction: !lambda return id(global_stepper_direction);
        microsteps: 8
        interpolation: true
        tcool_threshold: !lambda "return id(global_tcoolthrs);"
    - tmc2209.stallguard:
        threshold: !lambda "return id(global_sgthrs);"
    - tmc2209.currents:
        standstill_mode: freewheeling
        irun: !lambda "return id(global_irun);" #global variable
        ihold: 0
        tpowerdown: 0
        iholddelay: 0
    - stepper.set_speed:
        id: driver
        speed: !lambda "return id(global_speed);"
    - stepper.set_acceleration:
        id: driver
        acceleration: !lambda "return id(global_acceleration);"

uart:
  tx_pin: 6
  rx_pin: 5
  baud_rate: 500000

stepper:
  - platform: tmc2209
    id: driver
    max_speed: 2000 steps/s # Faster speed is louder
    acceleration: 2000 steps/s^2
    deceleration: 3000 steps/s^2
    config_dump_include_registers: true
    rsense: 100 mOhm
    vsense: False
    enn_pin: 8
    index_pin: 0
    diag_pin: 1
    on_stall:
      - stepper.stop: driver
      - stepper.report_position:
          id: driver
          position: 0
      - logger.log: "Homed cover"

binary_sensor:
 - platform: gpio
   name: Button 1
   id: btn1
   pin:
     number: 4
     mode: INPUT
     inverted: true
   filters:
     - delayed_on: 10ms
   on_release:
     then:
       - cover.close: ropener_cover
   on_click:
      min_length: 3000ms
      max_length: 10000ms
      then:
        - stepper.report_position:
            id: driver
            position: 0
        - stepper.set_target:
            id: driver
            target: 0
        - logger.log: "Homed cover"

# Add double click that closes the curtain until it stalls, or the button is pressed.

 - platform: gpio
   name: Button 2
   id: btn2
   pin:
     number: 3
     mode: INPUT
     inverted: true
   filters:
     - delayed_on: 10ms
   on_release:
    then:
     - cover.open: ropener_cover

cover:
  - platform: template
    id: ropener_cover
    name: Ropener
    has_position: true
    assumed_state: false
    lambda: "return float(id(driver)->current_position / float(id(global_distance_steps)));"
    stop_action:
      - stepper.stop: driver
    open_action:
      - stepper.set_target:
          id: driver
          target: !lambda return id(global_distance_steps);
    close_action:
      - stepper.set_target:
          id: driver
          target: 0
    position_action:
      - stepper.set_target:
          id: driver
          target: !lambda return pos * id(global_distance_steps);
    
    #These don't actually work. But they should   
    on_opening:
      - logger.log: "COVER Opening"
      - cover.template.publish:
          id: ropener_cover
          current_operation : OPENING
    on_opened:
      - logger.log: "COVER Open"
      - cover.template.publish:
          id: ropener_cover
          current_operation : IDLE
    on_closing:
      - logger.log: "COVER Closing"
      - cover.template.publish:
          id: ropener_cover
          current_operation : CLOSING
    on_closed:
      - logger.log: "COVER Closed"
      - cover.template.publish:
          id: ropener_cover
          current_operation : IDLE   

button:
  - platform: template
    name: "Stop/Set 0 Position"
    entity_category: DIAGNOSTIC
    on_press:
      - stepper.stop: driver
      - stepper.report_position:
          id: driver
          position: 0
      - stepper.set_target:
          id: driver
          target: 0

  - platform: template
    name: "Start/Close"
    entity_category: DIAGNOSTIC
    on_press:
      - stepper.report_position:
          id: driver
          position: 0
      - stepper.set_target:
          id: driver
          target: -100000 #move in the closing direction

# Preset speeds with working Stall Values
# Still a work in progess. Defaul values need to be figured out. These values are only placeholders for now.
# The goal is to create 3 different speeds, SLOW, MEDIUM, and FAST. And to add values that work with stallguard.
# This will allow the user to press the button in Home Assistant and set the values.     
  - platform: template
    name: "Preset Slow"
    entity_category: DIAGNOSTIC
    on_press:
      - globals.set:
          id: global_acceleration
          value: "1500" #UPDATE THIS
      - stepper.set_acceleration:
          id: driver
          acceleration: !lambda "return id(global_acceleration);"

      - globals.set:
          id: global_speed
          value: "2000" #UPDATE THIS
      - stepper.set_speed:
          id: driver
          speed: !lambda "return id(global_speed);"

      - globals.set:
          id: global_sgthrs
          value: "50" #UPDATE THIS
      - lambda: id(driver)->write_register(SGTHRS, id(global_sgthrs));

      - globals.set:
          id: global_tcoolthrs
          value: "200" #UPDATE THIS
      - lambda: id(driver)->write_register(TCOOLTHRS, id(global_tcoolthrs));

# ADD PRESET MEDIUM
# ADD PRESET FAST



switch:
  - platform: template
    name: "Motor Direction"
    entity_category: CONFIG
    optimistic: true
    turn_on_action:
      - globals.set:
          id: global_stepper_direction
          value: 'esphome::tmc2209::ShaftDirection::COUNTERCLOCKWISE'
      - tmc2209.configure:
          direction: !lambda return id(global_stepper_direction);
    turn_off_action:
      - globals.set:
          id: global_stepper_direction
          value: 'esphome::tmc2209::ShaftDirection::CLOCKWISE'
      - tmc2209.configure:
          direction: !lambda return id(global_stepper_direction);
          
number:
# SET distance
  - platform: template
    name: "Centimeters"
    step: 1
    min_value: 1
    max_value: 9000
    mode: BOX
    entity_category: CONFIG
    lambda: return id(global_distance_cm);
    update_interval: 1s
    set_action: 
      then:
        - globals.set:
            id: global_distance_cm
            value: !lambda "return x;"
        - globals.set:
            id: global_distance_revolutions
            value: !lambda "return float(id(global_distance_cm))/${gear_distance_cm};"
        - globals.set:
            id: global_distance_steps
            value: !lambda "return id(global_distance_revolutions)*${steps_per_revolution};"


# SET acceleration
  - platform: template
    name: "Acceleration"
    step: 100
    min_value: 100
    max_value: 10000
    mode: SLIDER
    entity_category: CONFIG
    lambda: return id(global_acceleration);
    update_interval: 1s
    set_action: 
      then:
        - globals.set:
            id: global_acceleration
            value: !lambda "return x;"
        - stepper.set_acceleration:
            id: driver
            acceleration: !lambda "return id(global_acceleration);"

# SET max_speed
  - platform: template
    name: "Speed"
    step: 100
    min_value: 100
    max_value: 10000
    mode: SLIDER
    entity_category: CONFIG
    lambda: return id(global_speed);
    update_interval: 1s
    set_action: 
      then:
        - globals.set:
            id: global_speed
            value: !lambda "return x;"
        - stepper.set_speed:
            id: driver
            speed: !lambda "return id(global_speed);"

# SET irun
  - platform: template
    name: "IRUN value"
    step: 1
    min_value: 1
    max_value: 31
    mode: BOX
    entity_category: CONFIG
    lambda: return id(driver)->read_field(IRUN_FIELD);
    update_interval: 1s
    set_action: 
      then:
        - globals.set:
            id: global_irun
            value: !lambda "return x;"
        - tmc2209.currents:
            irun: !lambda "return id(global_irun);"

# SET TCOOLTHRS
  - platform: template
    name: "TCOOLTHRS value"
    step: 1
    min_value: 0
    max_value: 1048575
    mode: BOX
    entity_category: CONFIG
    lambda: return id(driver)->read_register(TCOOLTHRS);
    update_interval: 1s
    set_action: 
      then:
        - globals.set:
            id: global_tcoolthrs
            value: !lambda "return x;"
        - lambda: id(driver)->write_register(TCOOLTHRS, x);

# SET SGTHRS
  - platform: template
    name: "SGTHRS value"
    step: 1
    min_value: 0
    max_value: 255
    mode: SLIDER
    entity_category: CONFIG
    lambda: return id(driver)->read_register(SGTHRS);
    update_interval: 1s
    set_action: 
      then:
        - globals.set:
            id: global_sgthrs
            value: !lambda "return x;"
        - lambda: id(driver)->write_register(SGTHRS, x);

# Display using sensor
sensor:
  - platform: template
    name: "TSTEP Sensor" # SHOW TSTEP
    lambda: return id(driver)->read_register(TSTEP);
    update_interval: 5s
    entity_category: DIAGNOSTIC
  - platform: template # SHOW SG_RESULT
    name: "SG_RESULT Sensor"
    lambda: return id(driver)->read_register(SG_RESULT);
    update_interval: 1s
    entity_category: DIAGNOSTIC
