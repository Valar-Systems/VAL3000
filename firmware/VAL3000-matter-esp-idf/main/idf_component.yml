dependencies:
  espressif/esp_matter: "^1.3.0"
  espressif/button: "^3.1.3"
  espressif/cmake_utilities:
    version: 0.*
    rules: # will add "optional_component" only when all if clauses are True
      - if: "idf_version >=5.0"
      - if: "target in [esp32c2]"
  espressif/esp_diag_data_store:
       version: "1.0.1"
       require: public
       rules:
           - if: "idf_version >=5.0"
           - if: "target != esp32h2"
